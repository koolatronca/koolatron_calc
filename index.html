<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
    }

    .calculator {
      width: 430px;
      max-width: 94vw;
      background: #0f172a;
      padding: 22px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .top {
      text-align: center;
      margin-bottom: 14px;
    }

    .top img {
      width: 75px;
      height: 75px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 8px;
    }

    .top h1 {
      font-size: 25px;
      margin: 0 0 8px;
    }

    #display {
      width: 100%;
      height: 72px;
      border: none;
      border-radius: 14px;
      margin-bottom: 16px;
      padding: 12px;
      font-size: 31px;
      text-align: right;
      background: #d1fae5;
      color: #064e3b;
      overflow-x: auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    button {
      height: 58px;
      border: none;
      border-radius: 14px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      background: #334155;
      color: white;
      box-shadow: inset 0 -4px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.97);
    }

    .operator {
      background: #f97316;
    }

    .clear {
      background: #ef4444;
    }

    .function {
      background: #7c3aed;
    }

    .back {
      background: #2563eb;
    }

    .equals {
      background: #22c55e;
    }

    .wide {
      grid-column: span 2;
    }

    .note {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="top">
      <img src="calculator-icon.png" alt="Calculator Icon">
      <h1>Advanced Calculator</h1>
    </div>

    <input id="display" type="text" value="0" readonly />

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="back" onclick="backspace()">⌫</button>
      <button class="function" onclick="appendValue('(')">(</button>
      <button class="function" onclick="appendValue(')')">)</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="function" onclick="appendValue('Math.sqrt(')">√</button>
      <button class="function" onclick="appendValue('**')">xʸ</button>
      <button class="function" onclick="appendValue('Math.PI')">π</button>
      <button class="function" onclick="appendValue('Math.sin(')">sin</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="function" onclick="appendValue('Math.cos(')">cos</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="function" onclick="appendValue('Math.tan(')">tan</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('.')">.</button>
      <button class="equals" onclick="calculate()">=</button>

      <button class="wide" onclick="appendValue('0')">0</button>
      <button class="function" onclick="appendValue('Math.log10(')">log</button>
      <button class="function" onclick="appendValue('Math.E')">e</button>
      <button class="function" onclick="toggleSign()">±</button>
    </div>

    <div class="note">Use xʸ for exponents, e.g. 2 xʸ 3 = 8</div>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      if (display.value === "0" || display.value === "Error") {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = "0";
    }

    function backspace() {
      if (display.value.length <= 1 || display.value === "Error") {
        display.value = "0";
      } else {
        display.value = display.value.slice(0, -1);
      }
    }

    function toggleSign() {
      if (display.value === "0" || display.value === "Error") return;
      display.value = "-(" + display.value + ")";
    }

    function calculate() {
      try {
        const allowed = /^[0-9+\-*/().\sMathPIEsqrtincostalog10**]+$/;
        if (!allowed.test(display.value)) {
          display.value = "Error";
          return;
        }

        const result = Function('"use strict"; return (' + display.value + ')')();

        if (!isFinite(result)) {
          display.value = "Error";
          return;
        }

        display.value = Number.isInteger(result)
          ? result
          : Number(result.toFixed(8)).toString();
      } catch {
        display.value = "Error";
      }
    }
  </script>
</body>
</html>
