<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
    }

    .calculator {
      width: 360px;
      max-width: 92vw;
      background: #0f172a;
      padding: 22px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .top {
      text-align: center;
      margin-bottom: 14px;
    }

    .top img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 8px;
    }

    .top h1 {
      font-size: 26px;
      margin: 0 0 8px;
    }

    #display {
      width: 100%;
      height: 70px;
      border: none;
      border-radius: 14px;
      margin-bottom: 16px;
      padding: 12px;
      font-size: 34px;
      text-align: right;
      background: #d1fae5;
      color: #064e3b;
      overflow-x: auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 64px;
      border: none;
      border-radius: 14px;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      background: #334155;
      color: white;
      box-shadow: inset 0 -4px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.97);
    }

    .operator {
      background: #f97316;
    }

    .clear {
      background: #ef4444;
    }

    .equals {
      background: #22c55e;
      grid-row: span 2;
      height: 140px;
    }

    .zero {
      grid-column: span 2;
    }

    .back {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="top">
      <img src="calculator-icon.png" alt="Calculator Icon">
      <h1>Calculator</h1>
    </div>

    <input id="display" type="text" value="0" readonly />

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="back" onclick="backspace()">⌫</button>
      <button class="operator" onclick="appendValue('/')">÷</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="equals" onclick="calculate()">=</button>

      <button class="zero" onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      if (display.value === "0" || display.value === "Error") {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = "0";
    }

    function backspace() {
      if (display.value.length <= 1 || display.value === "Error") {
        display.value = "0";
      } else {
        display.value = display.value.slice(0, -1);
      }
    }

    function calculate() {
      try {
        const result = Function('"use strict"; return (' + display.value + ')')();
        display.value = Number.isInteger(result) ? result : result.toFixed(6).replace(/0+$/, "").replace(/\.$/, "");
      } catch {
        display.value = "Error";
      }
    }
  </script>
</body>
</html>
