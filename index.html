<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Koolatron Smart Calculator</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="calculator">
      <header class="topbar">
        <div>
          <p class="eyebrow">Koolatron Utility</p>
          <h1>Smart Calculator</h1>
        </div>
        <button class="mode-pill" id="angleModeBtn" onclick="toggleAngleMode()">DEG</button>
      </header>

      <section class="display-panel">
        <textarea id="history" readonly placeholder="History"></textarea>
        <input id="display" readonly value="0" />
      </section>

      <section class="quick-row">
        <button onclick="useAnswer()">Ans</button>
        <button onclick="clearAll()">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="smartWrap('abs')">|x|</button>
      </section>

      <section class="keys">
        <button class="fn" onclick="smartWrap('sin')">sin</button>
        <button class="fn" onclick="smartWrap('cos')">cos</button>
        <button class="fn" onclick="smartWrap('tan')">tan</button>
        <button class="fn" onclick="smartWrap('sqrt')">√</button>
        <button class="op" onclick="appendOperator('/')">÷</button>

        <button class="fn" onclick="smartWrap('asin')">sin⁻¹</button>
        <button class="fn" onclick="smartWrap('acos')">cos⁻¹</button>
        <button class="fn" onclick="smartWrap('atan')">tan⁻¹</button>
        <button class="fn" onclick="smartPower()">xʸ</button>
        <button class="op" onclick="appendOperator('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="fn" onclick="smartWrap('log')">log</button>
        <button class="op" onclick="appendOperator('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="fn" onclick="smartWrap('ln')">ln</button>
        <button class="op" onclick="appendOperator('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="fn" onclick="appendConstant('pi')">π</button>
        <button class="eq" onclick="calculate()">=</button>

        <button class="wide" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button class="fn" onclick="appendConstant('e')">e</button>

        <button onclick="toggleSign()">±</button>
        <button onclick="smartSquare()">x²</button>
        <button onclick="smartFactorial()">x!</button>
        <button onclick="appendOperator('%')">%</button>
        <button onclick="appendOperator('^')">^</button>
      </section>

      <p class="helper">Smart flow: type 30 then press sin → sin(30). Type 5 then press x² → (5)².</p>
    </section>
  </main>
  <script src="scripts.js"></script>
</body>
</html>
